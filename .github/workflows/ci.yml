name: CI — Build & Test

# ── Triggers ──────────────────────────────────────────────────────────────────
on:
  push:
    branches: [develop]
  pull_request:
    branches: [main, develop]

# ── Jobs ──────────────────────────────────────────────────────────────────────
jobs:

  # ── Job 1: Inspect the diff and publish which services changed ──────────────
  detect-changes:
    name: Detect Changed Services
    runs-on: ubuntu-latest
    outputs:                                      # values other jobs can read
      master: ${{ steps.filter.outputs.master }}
      todo:   ${{ steps.filter.outputs.todo }}

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Check which service folders changed
        uses: dorny/paths-filter@v3               # marketplace action
        id: filter                                # id lets us reference its outputs
        with:
          filters: |
            master:
              - 'master/**'
            todo:
              - 'todo/**'

  # ── Job 2: Build & test master — skipped if master/ had no changes ──────────
  build-and-test-master:
    name: Master Service — Build & Test
    runs-on: ubuntu-latest
    needs: detect-changes                         # waits for Job 1 to finish
    if: ${{ needs.detect-changes.outputs.master == 'true' }}   # skips if false

    defaults:
      run:
        working-directory: master

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Make mvnw executable
        run: chmod +x ./mvnw

      - name: Build and run tests
        run: ./mvnw clean verify

  # ── Job 3: Build & test todo — skipped if todo/ had no changes ─────────────
  build-and-test-todo:
    name: Todo Service — Build & Test
    runs-on: ubuntu-latest
    needs: detect-changes
    if: ${{ needs.detect-changes.outputs.todo == 'true' }}

    defaults:
      run:
        working-directory: todo

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Make mvnw executable
        run: chmod +x ./mvnw

      - name: Build and run tests
        run: ./mvnw clean verify
