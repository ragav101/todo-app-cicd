name: CI — Build & Test

# ── Triggers ──────────────────────────────────────────────────────────────────
# Runs on every push to develop and on every PR targeting main or develop.
on:
  push:
    branches: [develop]
  pull_request:
    branches: [main, develop]

# ── Jobs ──────────────────────────────────────────────────────────────────────
# Both jobs run in parallel on separate runners.
jobs:

  build-and-test-master:
    name: Master Service — Build & Test
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: master       # all steps run inside the master/ folder

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'                # caches ~/.m2 between runs — faster builds

      - name: Build and run tests
        run: ./mvnw clean verify        # compile + test; fails the job if any test fails

  # ────────────────────────────────────────────────────────────────────────────

  build-and-test-todo:
    name: Todo Service — Build & Test
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: todo

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build and run tests
        run: ./mvnw clean verify
